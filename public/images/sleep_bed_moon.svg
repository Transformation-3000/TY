<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Night sky gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    
    <!-- Moon glow -->
    <filter id="moonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Cozy lamp light -->
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Sky -->
  <rect width="600" height="400" fill="url(#skyGrad)" />

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="100" cy="80" r="1.5" />
    <circle cx="150" cy="50" r="1" />
    <circle cx="280" cy="90" r="2" />
    <circle cx="350" cy="40" r="1" />
    <circle cx="480" cy="70" r="1.5" />
    <circle cx="520" cy="110" r="2" />
    <circle cx="200" cy="120" r="1" />
    <!-- Twinkle stars -->
    <polygon points="120,40 122,43 125,44 122,45 120,48 118,45 115,44 118,43" fill="#fef08a" opacity="0.8"/>
    <polygon points="450,130 451.5,133 454,134 451.5,135 450,138 448.5,135 446,134 448.5,133" fill="#fef08a" opacity="0.8"/>
  </g>

  <!-- Glowing Moon -->
  <path d="M 500,60 A 35,35 0 1,0 530,120 A 30,30 0 1,1 500,60 Z" fill="#fef08a" filter="url(#moonGlow)" />

  <!-- Window Frame in Background -->
  <rect x="50" y="60" width="160" height="220" rx="8" fill="none" stroke="#334155" stroke-width="3" opacity="0.4" />
  <line x1="130" y1="60" x2="130" y2="280" stroke="#334155" stroke-width="2" opacity="0.4" />
  <line x1="50" y1="140" x2="210" y2="140" stroke="#334155" stroke-width="2" opacity="0.4" />

  <!-- Window moonbeam reflection light -->
  <path d="M 50,140 L 250,380 L 120,380 L 50,250 Z" fill="#fef08a" opacity="0.03" />

  <!-- Bed Structure -->
  <!-- Backboard / Headboard -->
  <rect x="220" y="200" width="20" height="150" rx="4" fill="#475569" />
  
  <!-- Mattress Base -->
  <rect x="230" y="270" width="310" height="50" rx="6" fill="#64748b" />
  
  <!-- Wooden Legs -->
  <rect x="240" y="320" width="16" height="30" rx="2" fill="#334155" />
  <rect x="500" y="320" width="16" height="30" rx="2" fill="#334155" />

  <!-- Pillows -->
  <rect x="240" y="235" width="70" height="38" rx="8" fill="#e2e8f0" transform="rotate(-5 240 235)" />
  <rect x="245" y="240" width="70" height="38" rx="8" fill="#f1f5f9" transform="rotate(-3 245 240)" />

  <!-- Cozy Folded Duvet / Blanket -->
  <path d="M 310,265 L 530,265 A 10,10 0 0,1 540,275 L 540,310 A 10,10 0 0,1 530,320 L 310,320 A 15,15 0 0,1 295,305 L 295,280 A 15,15 0 0,1 310,265 Z" fill="#0891b2" />
  <!-- Folded down sheet at the top -->
  <path d="M 310,265 L 360,265 A 10,10 0 0,1 370,275 L 370,290 A 10,10 0 0,1 360,300 L 295,280 A 15,15 0 0,1 310,265 Z" fill="#ecfeff" />

  <!-- Sleep Zzzs -->
  <g fill="#fef08a" opacity="0.6" font-family="Arial, sans-serif" font-weight="bold">
    <text x="320" y="190" font-size="14" transform="rotate(-10 320 190)">z</text>
    <text x="335" y="170" font-size="20" transform="rotate(-15 335 170)">z</text>
    <text x="355" y="140" font-size="28" transform="rotate(-8 355 140)">Z</text>
  </g>

</svg>
